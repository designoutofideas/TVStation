<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legacy — RFA 24/7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#61C230;
  --light:#CCEDD0;
  --dim:#627568;
  --offwhite:#F0F6F0;
  --white:#FFFFFF;
  --red:#ff3b1f;
  --hud-bg:rgba(4,12,6,0.78);
}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;color:var(--offwhite)}

#screen{position:fixed;inset:0;background:#000}
#player{width:100%;height:100%;object-fit:contain;display:block}

/* ── LIVE FEED LAYER ── */
#live-layer{
  position:fixed;inset:0;z-index:80;
  background:#000;
  display:none;
}
#live-yt-container{
  position:absolute;inset:0;
}
#live-yt-container iframe,
#live-yt-player{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;
}
#live-iframe{
  width:100%;height:100%;border:none;display:none;
}
#live-hls{
  width:100%;height:100%;object-fit:contain;display:none;
}

/* Live feed HUD badge — replaces genre tag */
.live-feed-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;font-weight:600;letter-spacing:.28em;
  color:#fff;background:var(--red);
  padding:3px 10px;margin-top:5px;
  animation:live-pulse 2s ease-in-out infinite;
}
@keyframes live-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,59,31,0.6)}
  50%{box-shadow:0 0 0 6px rgba(255,59,31,0)}
}

/* Scheduled live countdown toast */
#live-countdown{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  z-index:401;
  background:rgba(255,59,31,0.12);
  border:1px solid rgba(255,59,31,0.5);
  backdrop-filter:blur(8px);
  color:var(--red);
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.22em;
  padding:10px 22px;
  opacity:0;transition:opacity 0.3s;
  pointer-events:none;white-space:nowrap;
}
#live-countdown.show{opacity:1}

/* ── UNMUTE OVERLAY ── */
#unmute-btn{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  z-index:200;
  display:none;
  align-items:center;gap:9px;
  background:rgba(4,12,6,0.88);
  border:1px solid rgba(97,194,48,0.5);
  backdrop-filter:blur(8px);
  color:var(--primary);
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.22em;
  padding:12px 24px;cursor:pointer;
  text-transform:uppercase;
  animation:unmute-pulse 2s ease-in-out infinite;
}
#unmute-btn.show{display:flex;}
@keyframes unmute-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(97,194,48,0.4);}
  50%{box-shadow:0 0 0 8px rgba(97,194,48,0);}
}

/* ── HUD ── */
#hud{
  position:fixed;inset:0;z-index:90;
  display:flex;flex-direction:column;justify-content:space-between;
  opacity:1;
  transition:opacity 0.6s ease;
  pointer-events:none;
}
#hud.hud-hidden{opacity:0;pointer-events:none}
#hud.hud-visible{opacity:1}

/* Top bar */
.hud-top{
  display:flex;justify-content:space-between;align-items:stretch;
  background:var(--hud-bg);
  backdrop-filter:blur(6px);
  border-bottom:1px solid rgba(97,194,48,0.2);
  padding:14px 28px 12px;
  pointer-events:all;
}

.sid{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(28px,3.8vw,54px);
  letter-spacing:.14em;
  color:var(--primary);
  text-shadow:0 0 22px rgba(97,194,48,0.6),0 0 60px rgba(97,194,48,0.2);
  line-height:1;
}
.ssub{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;font-weight:300;letter-spacing:.4em;
  color:var(--dim);display:block;margin-top:5px;
  text-transform:uppercase;
}
.live-row{
  display:flex;align-items:center;gap:7px;margin-top:9px;
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;
  letter-spacing:.25em;color:var(--red);text-shadow:0 0 10px var(--red);
}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--red);box-shadow:0 0 9px var(--red);
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.08}}

.clk{text-align:right;display:flex;flex-direction:column;justify-content:center}
#clock{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(22px,3.2vw,46px);
  letter-spacing:.1em;color:var(--offwhite);
  text-shadow:0 0 12px rgba(240,246,240,0.3);display:block;
}
#dateline{
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:.22em;color:var(--dim);margin-top:4px;
}

/* Bottom bar */
.hud-bot{
  display:flex;flex-direction:column;gap:0;
  background:var(--hud-bg);
  backdrop-filter:blur(6px);
  border-top:1px solid rgba(97,194,48,0.2);
  pointer-events:all;
}

.ptrack{width:100%;height:3px;background:rgba(97,194,48,0.1);cursor:pointer}
#pfill{height:100%;background:var(--primary);box-shadow:0 0 7px rgba(97,194,48,0.6);width:0%;transition:width 1s linear}

.irow{
  display:flex;justify-content:space-between;align-items:center;
  gap:20px;padding:14px 28px 16px;
}
.ncol{flex:1;min-width:0}
.lbl{
  font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;
  letter-spacing:.32em;color:var(--dim);text-transform:uppercase;margin-bottom:5px;
}
#now-title{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(16px,2.6vw,38px);
  letter-spacing:.07em;color:var(--primary);
  text-shadow:0 0 20px rgba(97,194,48,0.4);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58vw;
}
#genre{
  display:inline-block;font-family:'IBM Plex Mono',monospace;
  font-size:8px;font-weight:600;letter-spacing:.22em;
  color:var(--white);background:var(--primary);padding:3px 8px;margin-top:5px;
}
#pub-date{
  display:inline-block;font-family:'IBM Plex Mono',monospace;
  font-size:8px;font-weight:300;letter-spacing:.18em;
  color:var(--dim);margin-top:5px;margin-left:8px;
  vertical-align:middle;
}

.xcol{text-align:right;min-width:160px;max-width:260px}
#next-title{
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:300;
  color:var(--light);opacity:0.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#tleft{
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  color:var(--dim);margin-top:3px;
}

/* Volume control */
.vcol{
  display:flex;flex-direction:row;align-items:center;gap:7px;
  border-left:1px solid rgba(97,194,48,0.15);
  padding-left:16px;
  flex-shrink:0;
}
#vol-icon{font-size:11px;line-height:1;cursor:pointer}
#vol-pct{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--dim);letter-spacing:.08em;min-width:26px;text-align:right}
#vol-slider{
  -webkit-appearance:none;appearance:none;
  width:70px;height:2px;
  background:rgba(97,194,48,0.15);
  outline:none;cursor:pointer;
  border-radius:0;
}
#vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:9px;height:9px;
  border-radius:50%;
  background:var(--primary);
  box-shadow:0 0 6px rgba(97,194,48,0.7);
  cursor:pointer;
}
#vol-slider::-moz-range-thumb{
  width:9px;height:9px;
  border-radius:50%;border:none;
  background:var(--primary);
  box-shadow:0 0 6px rgba(97,194,48,0.7);
  cursor:pointer;
}
#vol-slider::-webkit-slider-runnable-track{
  background:linear-gradient(to right, var(--primary) 0%, var(--primary) var(--vol-pct, 100%), rgba(97,194,48,0.15) var(--vol-pct, 100%));
  height:2px;
}

/* Tune-in overlay */
#tunein{
  position:fixed;inset:0;z-index:300;
  background:rgba(2,8,3,.95);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;cursor:pointer;
}
#tunein-label{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(38px,7vw,90px);letter-spacing:.1em;
  color:var(--primary);
  text-shadow:0 0 40px rgba(97,194,48,0.7),0 0 80px rgba(97,194,48,0.2);
  text-align:center;line-height:1;
}
#tunein-sub{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:.26em;color:var(--dim);text-align:center;
}

/* Schedule reload toast */
#reload-toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  z-index:400;
  background:rgba(97,194,48,0.15);
  border:1px solid rgba(97,194,48,0.4);
  backdrop-filter:blur(8px);
  color:var(--primary);
  font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.25em;
  padding:8px 20px;
  opacity:0;transition:opacity 0.3s;
  pointer-events:none;
}
#reload-toast.show{opacity:1}

#flash{position:fixed;inset:0;z-index:95;background:#fff;opacity:0;pointer-events:none;transition:opacity .04s}
#flash.on{opacity:.35}
</style>
</head>

<!-- HLS.js for OBS/direct .m3u8 streams (fallback for non-native HLS browsers) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>

<!-- Firebase compat CDN (synchronous globals, no ES module race condition) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>

// ─────────────────────────────────────────────────────────────
//  🔧 PASTE YOUR FIREBASE CONFIG HERE
//  Get this from: Firebase Console → Project Settings → Your Apps
// ─────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────
//  🔧 PASTE YOUR FIREBASE CONFIG HERE
// ─────────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:            "AIzaSyCzP9ZdMI6unGKTGvgCLNXuvVUhIBJrT2o",
  authDomain:        "rfa-legacy.firebaseapp.com",
  projectId:         "rfa-legacy",
  storageBucket:     "rfa-legacy.firebasestorage.app",
  messagingSenderId: "760753759019",
  appId:             "1:760753759019:web:0d94416e5c2d2c80631b6e"
});

var db = firebase.firestore();

// ─────────────────────────────────────────────────────────────
//  FALLBACK SCHEDULE (used if Firestore is unreachable)
// ─────────────────────────────────────────────────────────────
const FALLBACK_BLOCKS = [
  {
    name:"普通話 — Mandarin Chinese", genre:"Mandarin Chinese", start:"00:00",
    items:[
      {t:"Hong Kong's Face Readers Reshape the Future",        id:"youtube-MJVRwBrkzsg", dur:272},
      {t:"Hong Kong Protesters Disappointed With Talks",       id:"youtube-hlSlk-vcnRU", dur:203},
      {t:"Chinese Police Quash Month-Long Land Protest",       id:"youtube-jMk4o81qxL0", dur:156},
      {t:"Will Senegal Fall Into a Belt and Road Debt Trap?",  id:"youtube-9w_JnNZtmm0", dur:445},
      {t:"China Culls Thousands of Pigs — African Swine Fever",id:"youtube-4NTCJgWqfwQ", dur:167},
    ]
  },
  {
    name:"မြန်မာဘာသာ — Burmese", genre:"Burmese", start:"02:40",
    items:[
      {t:"Myanmar's Jasmine Garland Sellers Go Back to School",  id:"youtube-9Nma364RVCg", dur:183},
      {t:"Myanmar Insurance Industry Grows As Economy Opens",    id:"youtube-zbq6lEW9FNU", dur:214},
      {t:"Myanmar Faces Flooding Emergency",                     id:"youtube-tkNpWKazyX0", dur:193},
      {t:"RFA Journalist Forced to Leave Myanmar After 2021 Coup",id:"youtube-V4wtcXnsJRQ",dur:178},
      {t:"Creative Outfits as Anti-Coup Demonstrations Continue",id:"youtube-SfDUJtzx_xA", dur:162},
    ]
  },
];

// ═══════════════════════════════════════════════════════════════════
//  BROADCAST ENGINE
// ═══════════════════════════════════════════════════════════════════

const DAY = 86400;
let BLOCKS   = FALLBACK_BLOCKS;
let TIMELINE = [];

function toSec(hhmm){const[h,m]=hhmm.split(':').map(Number);return h*3600+m*60}
function archiveUrl(id){return`https://archive.org/download/${id}/${id}.ia.mp4`}
function utcSec(){const d=new Date();return d.getUTCHours()*3600+d.getUTCMinutes()*60+d.getUTCSeconds()+d.getUTCMilliseconds()/1000}

function buildTimeline(blocks){
  const sorted=blocks.slice().sort((a,b)=>toSec(a.start)-toSec(b.start));
  const tl=[];
  sorted.forEach((block,bi)=>{
    if(!block.items||block.items.length===0) return;
    const bStart=toSec(block.start);
    const bEnd=bi+1<sorted.length?toSec(sorted[bi+1].start):DAY;
    if(bEnd<=bStart) return;
    let cursor=bStart,i=0;
    while(cursor<bEnd&&i<5000){
      const item=block.items[i%block.items.length];
      const archiveId=item.archiveId||item.id||'';
      const dur=parseInt(item.dur)||0;
      if(!archiveId||dur<=0){i++;continue;}
      const end=Math.min(cursor+dur,bEnd);
      tl.push({title:item.t||archiveId,id:archiveId,url:archiveUrl(archiveId),blockName:block.name,genre:block.genre,startSec:cursor,endSec:end});
      cursor=end;i++;
    }
  });
  return tl;
}

function findSlot(sec){
  const s=((sec%DAY)+DAY)%DAY;
  let idx=TIMELINE.findIndex(x=>s>=x.startSec&&s<x.endSec);
  return idx===-1?0:idx;
}

// ── DOM ──────────────────────────────────────────────────────
const player      = document.getElementById('player');
const clockEl     = document.getElementById('clock');
const dateEl      = document.getElementById('dateline');
const nowTitleEl  = document.getElementById('now-title');
const genreEl     = document.getElementById('genre');
const nextTitleEl = document.getElementById('next-title');
const tleftEl     = document.getElementById('tleft');
const pfillEl     = document.getElementById('pfill');
const flashEl     = document.getElementById('flash');
const tuneinEl    = document.getElementById('tunein');
const hudEl       = document.getElementById('hud');
const volSlider   = document.getElementById('vol-slider');
const volPct      = document.getElementById('vol-pct');
const volIcon     = document.getElementById('vol-icon');
const pubDateEl   = document.getElementById('pub-date');
const toastEl     = document.getElementById('reload-toast');

// ── STATE ────────────────────────────────────────────────────
let currentIdx  = -1;
let tickInterval = null;
let metaCache   = {};
let dateCache   = {};
let hasBooted   = false;

// ── FIRESTORE LIVE SCHEDULE ───────────────────────────────────
db.collection('broadcast').doc('schedule').onSnapshot(function(snap) {
  if (!snap.exists) {
    console.log('No Firestore schedule found — using fallback.');
    BLOCKS   = FALLBACK_BLOCKS;
    TIMELINE = buildTimeline(BLOCKS);
    return;
  }

  var data = snap.data();
  if (!data.blocks || !Array.isArray(data.blocks)) return;

  var isFirstLoad = TIMELINE.length === 0;
  BLOCKS   = data.blocks;
  TIMELINE = buildTimeline(BLOCKS);
  console.log('Schedule loaded from Firestore: ' + BLOCKS.length + ' blocks, ' + TIMELINE.length + ' slots.');

  if (!isFirstLoad && hasBooted) {
    showToast('⟳ SCHEDULE UPDATED');
    var now = utcSec();
    var ni  = findSlot(now);
    doCut(ni);
  }
}, function(err) {
  console.warn('Firestore error, using fallback schedule:', err.message);
  BLOCKS   = FALLBACK_BLOCKS;
  TIMELINE = buildTimeline(BLOCKS);
});

// Initialize with fallback until Firestore responds
TIMELINE = buildTimeline(FALLBACK_BLOCKS);

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 3000);
}

// ── HUD FADE ─────────────────────────────────────────────────
const HUD_TIMEOUT = 15000;
let hudTimer = null;

function showHUD(){
  hudEl.classList.remove('hud-hidden');
  hudEl.classList.add('hud-visible');
  if(hudTimer) clearTimeout(hudTimer);
  hudTimer=setTimeout(hideHUD,HUD_TIMEOUT);
}
function hideHUD(){
  hudEl.classList.add('hud-hidden');
  hudEl.classList.remove('hud-visible');
}

document.addEventListener('mousemove', showHUD);
document.addEventListener('touchstart', showHUD);
hudEl.addEventListener('mouseenter',()=>{if(hudTimer)clearTimeout(hudTimer)});
hudEl.addEventListener('mouseleave',()=>{hudTimer=setTimeout(hideHUD,HUD_TIMEOUT)});
showHUD();

// ── VOLUME ───────────────────────────────────────────────────
function updateVolIcon(v){
  if(v===0)volIcon.textContent='🔇';
  else if(v<40)volIcon.textContent='🔈';
  else if(v<75)volIcon.textContent='🔉';
  else volIcon.textContent='🔊';
}
volSlider.addEventListener('input',()=>{
  const v=parseInt(volSlider.value);
  player.volume=v/100;
  volPct.textContent=v+'%';
  updateVolIcon(v);
  volSlider.style.setProperty('--vol-pct',v+'%');
});
volSlider.style.setProperty('--vol-pct','100%');

// ── CLOCK ─────────────────────────────────────────────────────
const DN=['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MN=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function tickClock(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  clockEl.textContent=`${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
  dateEl.textContent=`${DN[d.getDay()]} ${d.getDate()} ${MN[d.getMonth()]} ${d.getFullYear()}`;
}
setInterval(tickClock,1000);tickClock();

// ── URL RESOLUTION ────────────────────────────────────────────
async function resolveUrl(id){
  if(metaCache[id])return metaCache[id];
  try{
    const r=await fetch(`https://archive.org/metadata/${id}`);
    const meta=await r.json();
    const files=meta.files||[];
    const fns=[
      f=>/\.ia\.mp4$/i.test(f.name),
      f=>/\.mp4$/i.test(f.name)&&f.source==='derivative',
      f=>/\.mp4$/i.test(f.name),
      f=>/\.ogv$/i.test(f.name),
    ];
    let picked=null;
    for(const fn of fns){picked=files.find(fn);if(picked)break}
    if(picked){
      const url=`https://archive.org/download/${id}/${encodeURIComponent(picked.name)}`;
      metaCache[id]=url;return url;
    }
  }catch(e){console.warn('metadata failed:',id,e.message)}
  return null;
}

// ── PUBLISH DATE ──────────────────────────────────────────────
async function fetchPublishDate(id){
  if(dateCache[id]!==undefined)return dateCache[id];
  dateCache[id]='';
  try{
    const r=await fetch(`https://archive.org/metadata/${id}`);
    const meta=await r.json();
    const raw=meta.metadata&&(meta.metadata.date||meta.metadata.publicdate||meta.metadata.addeddate);
    if(raw){
      const d=new Date(raw);
      if(!isNaN(d)){
        dateCache[id]=`${d.getUTCDate()} ${MN[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
      }else{dateCache[id]=raw.slice(0,10)}
    }
  }catch(e){dateCache[id]=''}
  return dateCache[id];
}

// ── PLAYBACK ──────────────────────────────────────────────────
async function playSlot(idx,seekLive){
  if(idx<0||idx>=TIMELINE.length)return;
  currentIdx=idx;
  const slot=TIMELINE[idx];
  const offset=seekLive?Math.max(0,utcSec()-slot.startSec):0;
  updateHUD();
  let url=metaCache[slot.id]||null;
  if(!url){
    url=slot.url;
    resolveUrl(slot.id).then(confirmed=>{
      if(liveFeedActive) return; // live feed took over — don't touch schedule player
      if(confirmed&&confirmed!==player.src&&currentIdx===idx){
        const t=player.currentTime;
        player.src=confirmed;player.load();
        player.currentTime=t;player.play().catch(()=>{});
      }
    });
  }
  if(player.src!==url){player.src=url;player.load()}
  const doPlay=()=>{
    if(liveFeedActive) return; // live feed active — suppress schedule playback
    if(offset>2){
      const dur=player.duration;
      const t=isFinite(dur)?Math.min(offset,dur-2):offset;
      if(t>0)player.currentTime=t;
    }
    player.play().catch(async e=>{
      const confirmed=await resolveUrl(slot.id);
      if(confirmed&&currentIdx===idx){
        player.src=confirmed;player.load();
        player.currentTime=offset>2?offset:0;
        player.play().catch(()=>{});
      }else if(!confirmed){
        console.warn('Skipping unplayable slot:',slot.title);
        doCut((idx+1)%TIMELINE.length);
      }
    });
  };
  if(player.readyState>=1)doPlay();
  else player.addEventListener('loadedmetadata',function h(){player.removeEventListener('loadedmetadata',h);doPlay()});
}

function doCut(nextIdx){
  flashEl.classList.add('on');
  setTimeout(()=>flashEl.classList.remove('on'),55);
  player.pause();
  showHUD();
  playSlot(nextIdx,false);
  const nn=TIMELINE[(nextIdx+1)%TIMELINE.length];
  if(nn&&!metaCache[nn.id])resolveUrl(nn.id);
}

// ── TICK ──────────────────────────────────────────────────────
function tick(){
  updateHUD();
  const now=utcSec();
  const slot=TIMELINE[currentIdx];
  if(!slot)return;
  if(now>=slot.endSec){
    const ni=findSlot(now);
    if(ni!==currentIdx)doCut(ni);
  }
}

// ── HUD UPDATE ────────────────────────────────────────────────
function updateHUD(){
  const slot=TIMELINE[currentIdx];
  if(!slot)return;
  const now=utcSec();
  const pct=Math.max(0,Math.min(100,((now-slot.startSec)/(slot.endSec-slot.startSec))*100));
  pfillEl.style.width=pct+'%';
  nowTitleEl.textContent=slot.title;
  genreEl.textContent=(slot.blockName||slot.genre||'BROADCAST').toUpperCase();
  const cached=dateCache[slot.id];
  if(cached){pubDateEl.textContent=cached}
  else if(cached===undefined){
    pubDateEl.textContent='';
    fetchPublishDate(slot.id).then(d=>{
      if(d&&TIMELINE[currentIdx]&&TIMELINE[currentIdx].id===slot.id)pubDateEl.textContent=d;
    });
  }
  const next=TIMELINE[(currentIdx+1)%TIMELINE.length];
  if(next){
    nextTitleEl.textContent=next.title;
    const s=Math.max(0,Math.round(slot.endSec-now));
    tleftEl.textContent=`in ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }
}

// ── VIDEO EVENTS ──────────────────────────────────────────────
player.addEventListener('ended',()=>{
  if(liveFeedActive) return;
  const now=utcSec();
  const ni=findSlot(now)===currentIdx?(currentIdx+1)%TIMELINE.length:findSlot(now);
  doCut(ni);
});
player.addEventListener('error',()=>{
  if(liveFeedActive) return;
  console.warn('player error — skipping');
  setTimeout(()=>doCut((currentIdx+1)%TIMELINE.length),600);
});

// ═══════════════════════════════════════════════════════════════════
//  LIVE FEED ENGINE
// ═══════════════════════════════════════════════════════════════════

const liveLayerEl     = document.getElementById('live-layer');
const liveIframeEl    = document.getElementById('live-iframe');
const liveHlsEl       = document.getElementById('live-hls');
const liveCountdownEl = document.getElementById('live-countdown');

let liveFeedActive    = false;
let liveScheduledAt   = null;
let liveScheduledEnd  = null;
let liveCountdownTimer= null;
let hlsInstance       = null;
let liveCurrentUrl    = null;
let liveCurrentLabel  = null;

// ── Firestore live-feed listener ──────────────────────────────────
db.collection('broadcast').doc('livefeed').onSnapshot(function(snap) {
  if (!snap.exists) { deactivateLiveFeed(); return; }
  var data = snap.data();
  var schedStart = (data.scheduledStart && data.scheduledStart > 0) ? data.scheduledStart * 1000 : null;
  var schedEnd   = (data.scheduledEnd   && data.scheduledEnd   > 0) ? data.scheduledEnd   * 1000 : null;
  var nowMs      = Date.now();

  if (!data.active && !schedStart) { deactivateLiveFeed(); clearLiveCountdown(); return; }

  if (schedStart && schedStart > nowMs) {
    liveScheduledAt  = schedStart;
    liveScheduledEnd = schedEnd;
    liveCurrentUrl   = data.url   || '';
    liveCurrentLabel = data.label || 'LIVE FEED';
    startLiveCountdown();
    return;
  }
  if (schedEnd && schedEnd <= nowMs) { deactivateLiveFeed(); clearLiveCountdown(); return; }

  if (data.active || (schedStart && schedStart <= nowMs)) {
    liveCurrentUrl   = data.url   || '';
    liveCurrentLabel = data.label || 'LIVE FEED';
    liveScheduledEnd = schedEnd;
    activateLiveFeed(liveCurrentUrl, liveCurrentLabel);
  } else {
    deactivateLiveFeed();
  }
}, function(err) {
  console.warn('Livefeed Firestore error:', err.message);
});

// ── YouTube IFrame API ────────────────────────────────────────────
var ytPlayer        = null;
var ytPlayerReady   = false;
var ytPendingUrl    = null;
var ytContainerEl   = document.getElementById('live-yt-container');

// Called automatically by YouTube IFrame API once script loads
window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('live-yt-player', {
    width:  '100%',
    height: '100%',
    playerVars: {
      autoplay:       1,
      mute:           1,   // start muted → autoplay allowed → then unmute in onReady
      controls:       0,
      rel:            0,
      modestbranding: 1,
      playsinline:    1,
      fs:             0,
    },
    events: {
      onReady: function(e) {
        ytPlayerReady = true;
        if (ytPendingUrl) {
          ytLoadAndPlay(ytPendingUrl);
          ytPendingUrl = null;
        }
      },
      onStateChange: function(e) {
        // YT.PlayerState.PLAYING = 1 — unmute as soon as video starts playing
        if (e.data === 1 && liveFeedActive) {
          ytPlayer.unMute();
          ytPlayer.setVolume(Math.round(
            parseInt(document.getElementById('vol-slider').value)
          ));
          hideUnmuteBtn();
        }
      },
      onError: function(e) {
        console.warn('YT player error:', e.data);
      }
    }
  });
};

function ytLoadAndPlay(videoId) {
  if (!ytPlayer || !ytPlayerReady) { ytPendingUrl = videoId; return; }
  ytPlayer.loadVideoById(videoId);
  // onStateChange will unmute once PLAYING fires
}

function ytExtractId(url) {
  var s = url.match(/youtu\.be\/([^?&\s]+)/);
  if (s) return s[1];
  var w = url.match(/[?&]v=([^&\s]+)/);
  if (w) return w[1];
  var l = url.match(/youtube\.com\/live\/([^?&\s]+)/);
  if (l) return l[1];
  return null;
}

function ytShow() {
  ytContainerEl.style.display = 'block';
  // Make the YT player iframe fill the container
  var iframe = ytContainerEl.querySelector('iframe');
  if (iframe) {
    iframe.style.width  = '100%';
    iframe.style.height = '100%';
    iframe.style.position = 'absolute';
    iframe.style.inset  = '0';
  }
}

function ytHide() {
  ytContainerEl.style.display = 'none';
  if (ytPlayer && ytPlayerReady) {
    try { ytPlayer.stopVideo(); ytPlayer.mute(); } catch(e) {}
  }
}

// ── Activate live feed ────────────────────────────────────────────
function activateLiveFeed(url, label) {
  if (!url) return;
  liveFeedActive = true;
  clearLiveCountdown();
  flashEl.classList.add('on');
  setTimeout(()=>flashEl.classList.remove('on'), 80);
  // Silence schedule player — mute + pause covers all async race conditions
  player.pause();
  player.muted  = true;
  player.volume = 0;

  var isHLS     = /\.m3u8/i.test(url);
  var isYouTube = /youtube\.com|youtu\.be/i.test(url);

  liveLayerEl.style.display   = 'block';
  liveIframeEl.style.display  = 'none';
  liveHlsEl.style.display     = 'none';
  ytHide();

  if (isHLS) {
    // ── HLS (OBS / local stream) ──────────────────────────────────
    liveHlsEl.style.display = 'block';
    liveHlsEl.muted = true; // start muted for autoplay, unmute immediately after play starts
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker:true, lowLatencyMode:true });
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(liveHlsEl);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, ()=> {
        liveHlsEl.play().then(()=>{
          // Unmute immediately — we already have a user gesture from tuneIn
          liveHlsEl.muted  = false;
          liveHlsEl.volume = parseInt(document.getElementById('vol-slider').value) / 100;
          hideUnmuteBtn();
        }).catch(()=>{
          // No gesture yet — show unmute button
          showUnmuteBtn();
        });
      });
      hlsInstance.on(Hls.Events.ERROR, (e,d)=>{
        if (d.fatal) setTimeout(()=>{ if(liveFeedActive) activateLiveFeed(url,label); }, 4000);
      });
    } else if (liveHlsEl.canPlayType('application/vnd.apple.mpegurl')) {
      liveHlsEl.src = url;
      liveHlsEl.play().then(()=>{
        liveHlsEl.muted  = false;
        liveHlsEl.volume = parseInt(document.getElementById('vol-slider').value) / 100;
        hideUnmuteBtn();
      }).catch(()=> showUnmuteBtn());
    }

  } else if (isYouTube) {
    // ── YouTube IFrame API ────────────────────────────────────────
    var videoId = ytExtractId(url);
    if (videoId) {
      ytShow();
      ytLoadAndPlay(videoId);
      // onStateChange(PLAYING) will unmute — show btn as fallback in case it's slow
      showUnmuteBtn();
    } else {
      // Fallback: plain iframe if ID extraction fails
      liveIframeEl.style.display = 'block';
      liveIframeEl.src = url;
      showUnmuteBtn();
    }

  } else {
    // ── Generic iframe ────────────────────────────────────────────
    liveIframeEl.style.display = 'block';
    if (liveIframeEl.src !== url) liveIframeEl.src = url;
    showUnmuteBtn();
  }

  updateHUDForLiveFeed(label);
  showToast('📡 LIVE FEED — ' + (label||'ON AIR').toUpperCase());

  if (liveScheduledEnd) {
    const ms = liveScheduledEnd - Date.now();
    if (ms > 0) setTimeout(()=>{ if(liveFeedActive) deactivateLiveFeed(); }, ms);
  }
}

const unmuteBtnEl = document.getElementById('unmute-btn');

function showUnmuteBtn() { unmuteBtnEl.classList.add('show'); }
function hideUnmuteBtn() { unmuteBtnEl.classList.remove('show'); }

function unmuteAll() {
  // HLS
  liveHlsEl.muted  = false;
  liveHlsEl.volume = parseInt(document.getElementById('vol-slider').value) / 100;
  // YouTube IFrame API
  if (ytPlayer && ytPlayerReady) {
    try {
      ytPlayer.unMute();
      ytPlayer.setVolume(parseInt(document.getElementById('vol-slider').value));
    } catch(e) {}
  }
  hideUnmuteBtn();
}

// ── Deactivate — snap back to UTC schedule ────────────────────────
function deactivateLiveFeed() {
  if (!liveFeedActive && liveLayerEl.style.display === 'none') return;
  liveFeedActive = false;
  flashEl.classList.add('on');
  setTimeout(()=>flashEl.classList.remove('on'), 80);
  // Tear down all stream types
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  liveHlsEl.src    = '';
  liveIframeEl.src = '';
  ytHide();
  liveLayerEl.style.display  = 'none';
  liveIframeEl.style.display = 'none';
  liveHlsEl.style.display    = 'none';
  // Restore genre element
  genreEl.classList.remove('live-feed-badge');
  genreEl.innerHTML = '—';
  // Restore schedule player audio
  player.muted  = false;
  player.volume = parseInt(document.getElementById('vol-slider').value) / 100;
  hideUnmuteBtn();
  // Snap back to correct UTC slot
  if (hasBooted && TIMELINE.length > 0) {
    const ni = findSlot(utcSec());
    _rawDoCut(ni);
  }
  showToast('⟳ RETURNING TO BROADCAST SCHEDULE');
}

// ── Scheduled countdown ───────────────────────────────────────────
function startLiveCountdown() {
  clearLiveCountdown();
  liveCountdownTimer = setInterval(()=>{
    const diff = liveScheduledAt - Date.now();
    if (diff <= 0) { clearLiveCountdown(); activateLiveFeed(liveCurrentUrl, liveCurrentLabel); return; }
    const t = Math.floor(diff/1000);
    const h = Math.floor(t/3600), m = Math.floor((t%3600)/60), s = t%60;
    const ts = h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    liveCountdownEl.textContent = `📡 LIVE FEED IN ${ts}${liveCurrentLabel ? ' — '+liveCurrentLabel.toUpperCase() : ''}`;
    liveCountdownEl.classList.add('show');
  }, 500);
}
function clearLiveCountdown() {
  if (liveCountdownTimer) { clearInterval(liveCountdownTimer); liveCountdownTimer = null; }
  liveCountdownEl.classList.remove('show');
}

// ── Guard tick, doCut, updateHUD when live ────────────────────────
const _rawTick = tick;
window._rawDoCut = doCut;
tick = function() { if (!liveFeedActive) _rawTick(); };
const _rawDoCut = doCut;
doCut = function(i) { if (!liveFeedActive) _rawDoCut(i); };
const _rawUpdateHUD = updateHUD;
updateHUD = function() {
  if (liveFeedActive) return;
  // Ensure genre el is clean before updating
  genreEl.classList.remove('live-feed-badge');
  _rawUpdateHUD();
};

// ── TUNE IN ───────────────────────────────────────────────────────
window.tuneIn = function(){
  tuneinEl.style.display='none';
  hasBooted=true;
  // If live feed is already active when user clicks tune-in, unmute it immediately
  // since we now have a user gesture
  if (liveFeedActive) { unmuteAll(); }
  const now=utcSec();
  const idx=findSlot(now);
  playSlot(idx,true);
  const next=TIMELINE[(idx+1)%TIMELINE.length];
  if(next&&!metaCache[next.id])resolveUrl(next.id);
  if(tickInterval)clearInterval(tickInterval);
  tickInterval=setInterval(tick,500);
};
</script>
