<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFA Admin — Schedule Editor</title>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#61C230; --pd:#4a9624; --pg:rgba(97,194,48,0.08);
  --dim:#627568; --off:#F0F6F0; --wh:#FFFFFF;
  --bg:#080e09; --s1:#0e1a10; --s2:#141f15;
  --b:rgba(97,194,48,0.14); --bh:rgba(97,194,48,0.35);
  --red:#ff4433; --redd:rgba(255,68,51,0.12); --amb:#f5a623;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif; --disp:'Bebas Neue',cursive;
}
html,body,#root{width:100%;min-height:100vh;background:var(--bg);color:var(--off);font-family:var(--sans);font-size:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}

/* LOGIN */
.lw{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:32px;background:radial-gradient(ellipse at 50% 30%,rgba(97,194,48,.06) 0%,transparent 70%)}
.ll{font-family:var(--disp);font-size:64px;letter-spacing:.12em;color:var(--p);text-shadow:0 0 40px rgba(97,194,48,.4);line-height:1}
.ls{font-family:var(--mono);font-size:9px;letter-spacing:.4em;color:var(--dim);text-transform:uppercase;margin-top:-20px}
.lc{background:var(--s1);border:1px solid var(--b);padding:40px 48px;display:flex;flex-direction:column;align-items:center;gap:20px;min-width:360px}
.lt{font-family:var(--mono);font-size:10px;letter-spacing:.32em;color:var(--dim);text-transform:uppercase}
.le{font-family:var(--mono);font-size:10px;color:var(--red);letter-spacing:.12em;text-align:center;background:var(--redd);border:1px solid rgba(255,68,51,.2);padding:8px 16px;width:100%}
.bg{display:flex;align-items:center;gap:12px;background:var(--wh);color:#333;border:none;cursor:pointer;padding:12px 24px;font-family:var(--sans);font-size:14px;font-weight:500;width:100%;justify-content:center;transition:opacity .15s}
.bg:hover{opacity:.9}.bg:disabled{opacity:.5;cursor:not-allowed}
.bg svg{width:18px;height:18px;flex-shrink:0}

/* APP */
.app{display:flex;flex-direction:column;min-height:100vh}

/* TOPBAR */
.tb{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;background:var(--s1);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:50}
.tbl{display:flex;align-items:center;gap:16px}
.tlo{font-family:var(--disp);font-size:28px;letter-spacing:.12em;color:var(--p);text-shadow:0 0 16px rgba(97,194,48,.4);line-height:1}
.tla{font-family:var(--mono);font-size:8px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;border-left:1px solid var(--b);padding-left:16px}
.tbr{display:flex;align-items:center;gap:12px}
.ub{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.1em}
.ua{width:26px;height:26px;border-radius:50%;border:1px solid var(--b);object-fit:cover}
.uap{width:26px;height:26px;border-radius:50%;background:var(--pd);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--wh)}
.sp{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;background:var(--s2);border:1px solid var(--b);padding:4px 10px}
.sp.live{color:var(--p);border-color:rgba(97,194,48,.3)}
.sd{width:6px;height:6px;border-radius:50%;background:var(--dim)}
.sp.live .sd{background:var(--p);box-shadow:0 0 6px var(--p);animation:blk 1.4s infinite}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.2}}

/* MAIN */
.main{display:flex;flex:1}

/* SIDEBAR */
.sb{width:280px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--b);display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sbs{padding:20px 16px 12px}
.sbh{font-family:var(--mono);font-size:8px;letter-spacing:.35em;color:var(--dim);text-transform:uppercase;margin-bottom:12px}
.bl{display:flex;flex-direction:column;gap:2px}
.bi{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border:1px solid transparent;transition:all .12s;border-radius:2px}
.bi:hover{background:var(--pg);border-color:var(--b)}
.bi.act{background:rgba(97,194,48,.1);border-color:rgba(97,194,48,.3)}
.bdo{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bin{flex:1;min-width:0}
.bn{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--off);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bm{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:1px}
.bc{font-family:var(--mono);font-size:9px;color:var(--dim);background:var(--s2);border:1px solid var(--b);padding:2px 6px;border-radius:2px;flex-shrink:0}
.sadd{margin:0 16px 16px;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:transparent;border:1px dashed rgba(97,194,48,.25);color:var(--dim);font-family:var(--mono);font-size:10px;letter-spacing:.2em;cursor:pointer;text-transform:uppercase;transition:all .12s}
.sadd:hover{border-color:var(--p);color:var(--p)}

/* EDITOR */
.ed{flex:1;padding:28px 32px;overflow-y:auto}
.ee{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;opacity:.4}
.eei{font-size:48px;line-height:1}
.eet{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase}
.eh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:20px}
.etg{display:flex;flex-direction:column;gap:8px;flex:1}
.et{font-family:var(--disp);font-size:36px;letter-spacing:.08em;line-height:1}
.ea{display:flex;gap:8px;flex-shrink:0}
.fg{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.fi{display:flex;flex-direction:column;gap:6px;flex:1;min-width:140px}
.fl{font-family:var(--mono);font-size:8px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase}
.fi input,.fi select{background:var(--s2);border:1px solid var(--b);color:var(--off);font-family:var(--mono);font-size:13px;padding:8px 12px;outline:none;width:100%;transition:border-color .15s}
.fi input:focus,.fi select:focus{border-color:var(--p)}
.fi select option{background:var(--s2)}
.ih{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.il{font-family:var(--mono);font-size:8px;letter-spacing:.32em;color:var(--dim);text-transform:uppercase}
.ic{font-family:var(--mono);font-size:9px;color:var(--dim);background:var(--s2);border:1px solid var(--b);padding:2px 8px}
.ir{display:grid;grid-template-columns:24px 1fr 200px 64px 32px;gap:6px;align-items:center;padding:8px 12px;border:1px solid var(--b);margin-bottom:4px;background:var(--s2);transition:border-color .12s}
.ir:hover{border-color:var(--bh)}
.in{font-family:var(--mono);font-size:10px;color:var(--dim);text-align:center;cursor:grab;user-select:none}
.ir input{background:transparent;border:none;border-bottom:1px solid transparent;color:var(--off);font-family:var(--mono);font-size:12px;padding:2px 4px;outline:none;width:100%;transition:border-color .12s}
.ir input:focus{border-bottom-color:var(--p)}
.ir input::placeholder{color:rgba(98,117,104,.5)}
.dd{font-family:var(--mono);font-size:10px;color:var(--dim);text-align:center}
.bic{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid transparent;cursor:pointer;color:var(--dim);font-size:14px;transition:all .12s;border-radius:2px}
.bic:hover{color:var(--red);border-color:rgba(255,68,51,.3);background:var(--redd)}
.aib{display:flex;align-items:center;gap:8px;padding:10px 16px;margin-top:8px;background:transparent;border:1px dashed rgba(97,194,48,.2);color:var(--dim);font-family:var(--mono);font-size:10px;letter-spacing:.2em;cursor:pointer;text-transform:uppercase;width:100%;transition:all .12s}
.aib:hover{border-color:var(--p);color:var(--p)}

/* BUTTONS */
.btn{display:flex;align-items:center;gap:7px;padding:9px 18px;font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap}
.bp{background:var(--p);border-color:var(--p);color:#050d06;font-weight:600}
.bp:hover{background:#74d63d;border-color:#74d63d}
.bp:disabled{opacity:.4;cursor:not-allowed}
.bg2{background:transparent;border-color:var(--b);color:var(--dim)}
.bg2:hover{border-color:var(--bh);color:var(--off)}
.bg2:disabled{opacity:.4;cursor:not-allowed}
.bdr{background:transparent;border-color:rgba(255,68,51,.3);color:var(--red)}
.bdr:hover{background:var(--redd)}

/* PUBLISH BAR */
.pb{position:sticky;bottom:0;background:var(--s1);border-top:1px solid var(--b);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;z-index:40}
.ps{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.15em}
.ps.saved{color:var(--p)}.ps.unsaved{color:var(--amb)}
.pa{display:flex;gap:10px}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--p);color:var(--p);font-family:var(--mono);font-size:10px;letter-spacing:.25em;padding:10px 24px;z-index:200;pointer-events:none;animation:tst .3s ease forwards}
@keyframes tst{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* SPINNER */
.spin{width:16px;height:16px;border:2px solid rgba(97,194,48,.2);border-top-color:var(--p);border-radius:50%;animation:spn .6s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spn{to{transform:rotate(360deg)}}

/* MODAL */
.mo{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center}
.md{background:var(--s1);border:1px solid var(--b);padding:32px;min-width:380px;max-width:480px;width:100%}
.mt{font-family:var(--disp);font-size:28px;letter-spacing:.08em;color:var(--p);margin-bottom:8px}
.ms{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-bottom:24px}
.ma{display:flex;gap:10px;margin-top:24px;justify-content:flex-end}
.swg{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.sw{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color .12s}
.sw.sel{border-color:var(--wh)}

.ldw{display:flex;align-items:center;justify-content:center;height:100vh;gap:12px}
.ldt{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.3em;text-transform:uppercase}

.note{margin-top:20px;padding:12px 16px;background:var(--s2);border:1px solid var(--b)}
.noteh{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:.3em;margin-bottom:8px}
.noteb{font-family:var(--mono);font-size:10px;color:var(--dim);line-height:1.7}
.noteb code{color:var(--p)}
</style>
</head>

function Toast(props) {
  return h('div',{className:'toast'}, props.message);
}

function Spinner() {
  return h('div',{className:'spin'});
}

// ── Login ─────────────────────────────────────────────────────
function LoginScreen(props) {
  var _e = useState('');   var error = _e[0]; var setError = _e[1];
  var _l = useState(false);var loading= _l[0]; var setLoading=_l[1];

  function handleSignIn() {
    setLoading(true); setError('');
    auth.signInWithPopup(provider).then(function(result) {
      var email = result.user.email;
      if (ALLOWED_EMAILS.indexOf(email) === -1) {
        auth.signOut();
        setError('Access denied — ' + email + ' is not on the approved list.');
        setLoading(false);
        return;
      }
      props.onLogin(result.user);
    }).catch(function(e) {
      setError(e.message);
      setLoading(false);
    });
  }

  return h('div',{className:'lw'},
    h('div',{style:{textAlign:'center'}},
      h('div',{className:'ll'},'RFA'),
      h('div',{className:'ls'},'Schedule Admin · Broadcast Control')
    ),
    h('div',{className:'lc'},
      h('div',{className:'lt'},'Team Sign-In Required'),
      error ? h('div',{className:'le'},error) : null,
      h('button',{className:'bg', onClick:handleSignIn, disabled:loading},
        loading ? h(Spinner) : GoogleSVG,
        loading ? 'Signing in…' : 'Continue with Google'
      )
    )
  );
}

// ── Add Block Modal ───────────────────────────────────────────
function AddBlockModal(props) {
  var _n=useState('');   var name=_n[0];  var setName=_n[1];
  var _g=useState('');   var genre=_g[0]; var setGenre=_g[1];
  var _s=useState('00:00'); var start=_s[0]; var setStart=_s[1];
  var _c=useState(COLORS[0]); var color=_c[0]; var setColor=_c[1];

  function submit() {
    if (!name.trim()) return;
    props.onAdd({id:uid(),name:name.trim(),genre:genre.trim()||name.trim(),start:start,color:color,items:[]});
    props.onClose();
  }

  return h('div',{className:'mo', onClick:props.onClose},
    h('div',{className:'md', onClick:function(e){e.stopPropagation()}},
      h('div',{className:'mt'},'New Block'),
      h('div',{className:'ms'},'Add a language / programming block'),

      h('div',{className:'fg'},

          h('div',{className:'fl'},'Genre / Language'),
          h('input',{value:genre, onChange:function(e){setGenre(e.target.value)}, placeholder:'Korean'})
        ),
        h('div',{className:'fi',style:{maxWidth:100}},
          h('div',{className:'fl'},'UTC Start'),
          h('input',{value:start, onChange:function(e){setStart(e.target.value)}, placeholder:'HH:MM'})
        )
      ),
      h('div',{className:'fi',style:{marginTop:4}},

// ── Item Row ──────────────────────────────────────────────────
function ItemRow(props) {
  var item=props.item, i=props.index;
  return h('div',{
    className:'ir', draggable:true,

    h('button',{className:'bic',title:'Remove',onClick:function(){props.onDelete(i);}}, '✕')

    props.onChange(Object.assign({},block,{items:items}));
  }
  function addItem(){
    props.onChange(Object.assign({},block,{items:block.items.concat([{id:uid(),t:'',archiveId:'',dur:0}])}));
  }
  function delItem(i){
    props.onChange(Object.assign({},block,{items:block.items.filter(function(_,j){return j!==i;})}));
  }
  function handleDrop(i){
    if(dragFrom===null||dragFrom===i) return;
    var items=block.items.slice();
    var moved=items.splice(dragFrom,1)[0];
    items.splice(i,0,moved);
    props.onChange(Object.assign({},block,{items:items}));
    setDragFrom(null);
  }

  var totalDur=block.items.reduce(function(s,it){return s+(parseInt(it.dur)||0);},0);
  var col=block.color||COLORS[0];

  return h('div',null,
    // Header
    h('div',{className:'eh'},
      h('div',{className:'etg'},
        h('div',{className:'et',style:{color:col}}, block.name||'Untitled Block'),
        h('span',{style:{fontFamily:'var(--mono)',fontSize:'9px',color:'var(--dim)',letterSpacing:'.2em'}},
          'UTC '+block.start+' · '+block.items.length+' ITEMS · '+fmtDur(totalDur)+' TOTAL')
      ),
      h('div',{className:'ea'},
        h('button',{className:'btn bdr',onClick:props.onDelete},'Delete Block')
      )
    ),
    // Fields
    h('div',{className:'fg'},
      h('div',{className:'fi',style:{flex:2}},
        h('div',{className:'fl'},'Block Name'),
        h('input',{value:block.name,placeholder:'Language block name',onChange:function(e){upField('name',e.target.value);}})
      ),
      h('div',{className:'fi'},
        h('div',{className:'fl'},'Genre Label'),
        h('input',{value:block.genre,placeholder:'Language',onChange:function(e){upField('genre',e.target.value);}})
      ),
      h('div',{className:'fi',style:{maxWidth:120}},
        h('div',{className:'fl'},'UTC Start'),
        h('input',{value:block.start,placeholder:'HH:MM',onChange:function(e){upField('start',e.target.value);}})
      ),
      h('div',{className:'fi',style:{maxWidth:80}},
        h('div',{className:'fl'},'Color'),
        h('select',{value:col,style:{background:col+'22',borderColor:col},onChange:function(e){upField('color',e.target.value);}},
          COLORS.map(function(c){return h('option',{key:c,value:c,style:{background:'var(--s2)'}},c);})
        )
      )
    ),
    // Items header
    h('div',{className:'ih'},
      h('div',{className:'il'},'Playlist Items'),
      h('div',{className:'ic'},block.items.length+' items')
    ),
    // Column labels
    h('div',{style:{display:'grid',gridTemplateColumns:'24px 1fr 200px 64px 32px',gap:6,padding:'4px 12px',marginBottom:4}},
      h('div',null),
      h('div',{style:{fontFamily:'var(--mono)',fontSize:'8px',color:'var(--dim)',letterSpacing:'.25em'}},'TITLE'),
      h('div',{style:{fontFamily:'var(--mono)',fontSize:'8px',color:'var(--dim)',letterSpacing:'.25em'}},'ARCHIVE.ORG ID'),
      h('div',{style:{fontFamily:'var(--mono)',fontSize:'8px',color:'var(--dim)',letterSpacing:'.25em',textAlign:'center'}},'DUR'),
      h('div',null)
    ),
    // Item rows
    block.items.map(function(item,i){
      return h(ItemRow,{key:item.id,item:item,index:i,onUpdate:upItem,onDelete:delItem,onDragStart:setDragFrom,onDrop:handleDrop});
    }),
    h('button',{className:'aib',onClick:addItem},'+ Add Item'),
    // Note
    h('div',{className:'note'},
      h('div',{className:'noteh'},'DURATION NOTE'),
      h('div',{className:'noteb'},
        'Duration is in seconds. Find it at ',
        h('span',{style:{color:'var(--off)'}},'archive.org/metadata/<id>'),
        ' under the file\'s ',h('code',null,'length'),' field. Items loop within each block\'s time window.'
      )
    )
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  var _u=useState(null);      var user=_u[0];         var setUser=_u[1];
  var _ac=useState(false);    var authChecked=_ac[0];  var setAuthChecked=_ac[1];
  var _bl=useState([]);       var blocks=_bl[0];       var setBlocks=_bl[1];
  var _ai=useState(null);     var activeId=_ai[0];     var setActiveId=_ai[1];
  var _di=useState(false);    var isDirty=_di[0];      var setIsDirty=_di[1];
  var _is=useState(false);    var isSaving=_is[0];     var setIsSaving=_is[1];
  var _il=useState(true);     var isLoading=_il[0];    var setIsLoading=_il[1];
  var _to=useState(null);     var toast=_to[0];        var setToast=_to[1];
  var _ab=useState(false);    var showAdd=_ab[0];      var setShowAdd=_ab[1];
  var _ls=useState('connecting'); var liveStatus=_ls[0]; var setLiveStatus=_ls[1];
  var _sv=useState(null);     var lastSaved=_sv[0];    var setLastSaved=_sv[1];

  var toastTimer  = useRef(null);
  var fsUnsub     = useRef(null);

  function showToast(msg) {
    setToast(msg);
    if(toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(function(){setToast(null);}, 3500);
  }

  // Auth listener
  useEffect(function(){
    return auth.onAuthStateChanged(function(u){
      if(u && ALLOWED_EMAILS.indexOf(u.email) !== -1) {
        setUser(u);
      } else {
        setUser(null);
        setIsLoading(false);
      }
      setAuthChecked(true);
    });
  }, []);

  // Firestore listener
  useEffect(function(){
    if(!user) return;
    if(fsUnsub.current) fsUnsub.current();

    fsUnsub.current = db.collection('broadcast').doc('schedule')
      .onSnapshot(function(snap){
        setLiveStatus('live');
        if(snap.exists) {
          var data = snap.data();
          if(data && Array.isArray(data.blocks)) {
            var hydrated = data.blocks.map(function(b){
              return Object.assign({},b,{
                id: b.id||uid(),
                items: (b.items||[]).map(function(it){ return Object.assign({},it,{id:it.id||uid()}); })
              });
            });
            setBlocks(hydrated);
            setActiveId(function(id){ return id || (hydrated[0]&&hydrated[0].id) || null; });
          }
        } else {
          setBlocks(DEFAULT_BLOCKS);
          setActiveId(DEFAULT_BLOCKS[0].id);
        }
        setIsLoading(false);
        setIsDirty(false);
      }, function(err){
        console.error('Firestore error:', err);
        setLiveStatus('error');
        setIsLoading(false);
      });

    return function(){ if(fsUnsub.current) fsUnsub.current(); };
  }, [user]);

  function handleBlockChange(updated) {
    setBlocks(function(prev){ return prev.map(function(b){ return b.id===updated.id ? updated : b; }); });
    setIsDirty(true);
  }
  function handleAddBlock(block) {
    setBlocks(function(prev){ return prev.concat([block]); });
    setActiveId(block.id);
    setIsDirty(true);
  }
  function handleDeleteBlock(id) {
    var next = blocks.filter(function(b){ return b.id!==id; });
    setBlocks(next);
    setActiveId(next.length ? next[next.length-1].id : null);
    setIsDirty(true);
  }

  function publishSchedule() {
    setIsSaving(true);
    var toSave = blocks.map(function(b){
      return {
        id:b.id, name:b.name, genre:b.genre, start:b.start, color:b.color||COLORS[0],
        items:b.items.map(function(it){
          return {id:it.id, t:it.t, archiveId:it.archiveId, dur:parseInt(it.dur)||0};
        })
      };
    });
    db.collection('broadcast').doc('schedule').set({
      blocks: toSave,
      publishedAt: firebase.firestore.FieldValue.serverTimestamp(),
      publishedBy: user.email
    }).then(function(){
      setIsDirty(false);
      setLastSaved(new Date());
      showToast('✓ SCHEDULE PUBLISHED — LIVE IN ~1 SECOND');
      setIsSaving(false);
    }).catch(function(e){
      showToast('✗ PUBLISH FAILED: ' + e.message);
      setIsSaving(false);
    });
  }

  function handleSignOut() {
    if(fsUnsub.current) fsUnsub.current();
    auth.signOut();
    setUser(null); setBlocks([]); setActiveId(null);
  }

  // ── Render ───────────────────────────────────────────────
  if (!authChecked) {
    return h('div',{className:'ldw'}, h(Spinner), h('span',{className:'ldt'},'Initialising…'));
  }
  if (!user) return h(LoginScreen,{onLogin:setUser});

  var activeBlock = blocks.find(function(b){ return b.id===activeId; });
  var sorted = blocks.slice().sort(function(a,b){
    var av=a.start.split(':').map(Number); var bv=b.start.split(':').map(Number);
    return (av[0]*60+av[1])-(bv[0]*60+bv[1]);
  });

  var statusLabel = liveStatus==='live' ? 'FIRESTORE LIVE' : liveStatus==='error' ? 'OFFLINE' : 'CONNECTING';
  var saveLabel   = isDirty ? '● UNSAVED CHANGES' : lastSaved ? '✓ SAVED '+lastSaved.toLocaleTimeString() : '✓ IN SYNC WITH FIRESTORE';

  return h('div',{className:'app'},
    // Topbar
    h('div',{className:'tb'},
      h('div',{className:'tbl'},
        h('div',{className:'tlo'},'RFA'),
        h('div',{className:'tla'},'Schedule Admin')
      ),
      h('div',{className:'tbr'},
        h('div',{className:'sp'+(liveStatus==='live'?' live':'')},
          h('div',{className:'sd'}), statusLabel
        ),
        h('div',{className:'ub'},
          user.photoURL
            ? h('img',{className:'ua',src:user.photoURL,alt:''})
            : h('div',{className:'uap'}, (user.email||'?')[0].toUpperCase()),
          h('span',null,user.email)
        ),
        h('button',{className:'btn bg2',style:{padding:'6px 12px',fontSize:'9px'},onClick:handleSignOut},'Sign Out')
      )
    ),

    // Main
    h('div',{className:'main'},
      // Sidebar
      h('div',{className:'sb'},
        h('div',{className:'sbs'},
          h('div',{className:'sbh'},'Blocks — '+blocks.length),
          h('div',{className:'bl'},
            sorted.map(function(b){
              return h('div',{key:b.id,className:'bi'+(activeId===b.id?' act':''),onClick:function(){setActiveId(b.id);}},
                h('div',{className:'bdo',style:{background:b.color||'#61C230'}}),
                h('div',{className:'bin'},
                  h('div',{className:'bn'},b.name),
                  h('div',{className:'bm'},'UTC '+b.start)
                ),
                h('div',{className:'bc'},b.items.length)
              );
            })
          )
        ),
        h('button',{className:'sadd',onClick:function(){setShowAdd(true);}}, '+ New Block')
      ),

      // Editor
      h('div',{className:'ed'},
        isLoading
          ? h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',gap:12}},
              h(Spinner),
              h('span',{style:{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--dim)',letterSpacing:'.2em'}},'LOADING FROM FIRESTORE…')
            )
          : activeBlock
            ? h(BlockEditor,{key:activeBlock.id, block:activeBlock, onChange:handleBlockChange, onDelete:function(){handleDeleteBlock(activeBlock.id);}})
            : h('div',{className:'ee'},
                h('div',{className:'eei'},'📡'),
                h('div',{className:'eet'},'Select or create a block to edit')
              )
      )
    ),

    // Publish bar
    h('div',{className:'pb'},
      h('div',null,
        h('div',{className:'ps '+(isDirty?'unsaved':'saved')}, saveLabel),
        h('div',{style:{fontFamily:'var(--mono)',fontSize:'8px',color:'var(--dim)',marginTop:4,letterSpacing:'.15em'}},
          'Publishing pushes the schedule live instantly — no page reload needed on viewer.')
      ),
      h('div',{className:'pa'},
        h('button',{className:'btn bg2',disabled:!isDirty,onClick:function(){setIsDirty(false);showToast('Changes discarded');}}, 'Discard'),
        h('button',{className:'btn bp',disabled:isSaving||!isDirty,onClick:publishSchedule},
          isSaving ? h(Spinner) : null,
          isSaving ? ' Publishing…' : '⬆ Publish to Live'
        )
      )
    ),

    showAdd ? h(AddBlockModal,{onAdd:handleAddBlock,onClose:function(){setShowAdd(false);}}) : null,
    toast   ? h(Toast,{message:toast}) : null
  );
}

// ── Boot ──────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
